<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FindYourCarNow</title>
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css?family=Raleway:400,700,900&display=swap" rel="stylesheet">
</head>
<body>

<header class="header">
    <div class="container">
        <div class="header_inner">
            <div class="logo">
                <a href="#">
                    <img src="img/logo2.png" alt="logo">
                </a>
            </div>
            <nav class="menu">
                <div class="btn_menu">
                    <div></div>
                    <div></div>
                    <div></div>
                </div>
                <ul class="menu_list">
                    <li><a href="#">Search</a></li>
                    <li><a href="#">Let the car work</a></li>
                    <li><a href="#">Terms of use</a></li>
                    <li><a href="#">Sign up</a></li>
                    <li><a href="#">Log in</a></li>
                </ul>
            </nav>
        </div>
    </div>
</header>

<div class="image_reg">
    <div class="main-image">
        <img src="img/742079-PSISLA-798.png">
    </div>
    <div class="reg">
        <form style="padding-left: 20%; alignment: center">
            <p class="regLogSignTopHeader">Find your car now!</p>
            <p class="regLogSignBotHeader">Type your data and hit Yalla!</p>
            <input type="text" id="location" placeholder="Location">
            <input type="text" id="from" placeholder="From">
            <input type="text" id="till" placeholder="Till">
            <button type="submit">Y’alla!</button>
        </form>
    </div>
</div>


</body>
</html>
